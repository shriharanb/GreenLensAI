<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Recovery | GreenLensAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/password-recovery.css">
</head>

<body>

  <div class="recovery-card">
    <div class="logo">
      <i class="fas fa-seedling"></i>
    </div>

    <div class="title">GreenLensAI Recovery (OTP)</div>
    <div class="subtitle">Reset your password using a verified mobile OTP</div>

    <div id="step1">
      <div class="input-container">
        <i class="fa-solid fa-id-badge input-icon"></i>
        <input type="text" id="farmerId" placeholder="Unique ID (e.g., rakesh_sharma)" autocomplete="off">
      </div>

      <button class="send-btn" id="sendOtpBtn" onclick="sendOTP()" style="margin-top: 20px;">
        <span>Send Verification OTP</span>
        <i class="fa-solid fa-paper-plane"></i>
      </button>

      <div id="otp-section" style="display: none; margin-top: 20px;">
        <div class="subtitle">Enter the 6-digit OTP sent to your phone</div>
        <div class="input-container">
          <i class="fas fa-key input-icon"></i>
          <input type="text" id="otpCode" placeholder="Enter 6-digit OTP" autocomplete="off" maxlength="6">
        </div>

        <button class="send-btn" onclick="verifyOTP()" style="margin-top: 20px;">
          <span>Verify OTP</span>
          <i class="fa-solid fa-check-circle"></i>
        </button>
      </div>
    </div>

    <div id="step2" style="display: none;">
      <div class="subtitle">Identity Verified! Enter your new password</div>
      <div class="input-container">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="newPassword" placeholder="New Password" autocomplete="off">
      </div>
      <div class="input-container" style="margin-top: 15px;">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="confirmPassword" placeholder="Confirm New Password" autocomplete="off">
      </div>

      <button class="send-btn" onclick="resetPassword()" style="margin-top: 20px;">
        <span>Reset Password</span>
        <i class="fa-solid fa-key"></i>
      </button>
    </div>

    <div id="message" style="margin-top: 15px; text-align: center; font-size: 0.9em;"></div>

    <div class="footer-text">
      Growing trust with secure digital agriculture
    </div>
    <div class="login-link">Back to Login? <a href="../Pages/login.html">Login</a></div>
  </div>

  <script src="../assets/js/password-recovery.js"></script>

</body>

</html>
