<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Registration | Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/register.css">
</head>

<body>

    <div class="container">
        <div class="image-section">
            <div class="image-text">
                <h1>Join GreenLensAI</h1>
                <p>Detect crop diseases early and get expert guidance instantly</p>
            </div>
        </div>

        <div class="form-section">
            <div class="header">
                <h2>Farmer Registration</h2>
                <span>Protect your crops with AI</span>
            </div>

            <div style="background: #e8f5e9; color: #2e7d32; padding: 12px; border-radius: 8px; margin: 15px 0; font-size: 13px; text-align: center; border: 1px solid #c8e6c9;">
                <strong>Diagnostic Mode:</strong> OTP flow v5 active.
            </div>

            <form id="regForm">
                <div class="input-grid">

                    <div class="input-group full-width">
                        <label>Farmer ID</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card field-icon"></i>
                            <input type="text" id="farmerID" placeholder="Unique ID (e.g., rakesh_sharma)" required>
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label>Phone Number</label>
                        <div class="input-wrapper">
                            <select class="country-select" id="countryCode">
                            </select>
                            <input type="tel" id="phone" placeholder="Enter mobile number" required>
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label>Farmer ID Recovery Question</label>
                        <div class="input-wrapper">
                            <i class="fas fa-question-circle field-icon"></i>
                            <span id="fullName" class="question-display"> What's your favourite food?</span>
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label>ID Recovery Answer (Answer in single word)</label>
                        <div class="input-wrapper">
                            <i class="fas fa-pen field-icon"></i> <input type="text" id="recoveryAnswer"
                                placeholder=" (eg. Tiramisu)" required>
                        </div>
                    </div>


                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock field-icon"></i>
                            <input type="password" id="password" placeholder="Create password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePwd('password', this)"></i>
                        </div>
                        <div class="password-hint">8+ chars, 1 Upper, 1 Number, 1 Symbol</div>
                    </div>

                    <div class="input-group">
                        <label>Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock field-icon"></i>
                            <input type="password" id="confirmPassword" placeholder="Repeat password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePwd('confirmPassword', this)"></i>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="registerBtn">Register Now <i class="fas fa-tractor"></i></button>
                <div id="msg"></div>
                
                <div id="otpSection" style="display: none; margin-top: 15px;">
                    <div class="input-group full-width">
                        <label>Enter OTP</label>
                        <div class="input-wrapper">
                            <i class="fas fa-key field-icon"></i>
                            <input type="text" id="regOtp" placeholder="6-digit OTP" maxlength="6">
                        </div>
                    </div>
                    <button type="button" class="submit-btn" id="verifyOtpBtn" style="margin-top: 10px;">Verify OTP <i class="fas fa-check-circle"></i></button>
                </div>

                <div class="login-link">Already a member? <a href="../Pages/login.html">Login</a></div>
            </form>
        </div>
    </div>

    <script src="../assets/js/register_final_v5.js"></script>
</body>

</html>
